services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: savecounterstrike-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - ADMIN_STEAM_IDS=${ADMIN_STEAM_IDS}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: savecounterstrike-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=savecounterstrike
      - POSTGRES_USER=scs_user
      - POSTGRES_PASSWORD=devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scs_user -d savecounterstrike"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
